name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check odooai/ tests/
      - name: Ruff format
        run: ruff format --check odooai/ tests/

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: mypy --strict
        run: mypy odooai/ --strict

  test:
    name: Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v --tb=short
      - name: Run tests with coverage
        if: matrix.python-version == '3.11'
        run: pytest tests/ -v --cov=odooai --cov-report=term --cov-fail-under=70

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Bandit
        run: bandit -r odooai/ -ll -ii

  commit-format:
    name: Commit Message Format
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check commit format
        run: |
          git log origin/${{ github.base_ref }}..HEAD --pretty=format:"%s" | while read msg; do
            if ! echo "$msg" | grep -qE '^\[ODAI-[A-Z]+-[0-9]+\] (feat|fix|refactor|test|docs|chore|sec):'; then
              echo "❌ Bad commit message: $msg"
              echo "Expected: [ODAI-XXX] type: description"
              exit 1
            fi
          done
          echo "✅ All commit messages follow the format"

  file-length:
    name: File Length Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check files under 300 lines
        run: |
          OVER=0
          for f in $(find odooai/ -name "*.py" -type f -not -name "cli.py" -not -name "_cli_*"); do
            LINES=$(wc -l < "$f")
            if [ "$LINES" -gt 300 ]; then
              echo "❌ $f has $LINES lines (max 300)"
              OVER=1
            fi
          done
          if [ "$OVER" -eq 1 ]; then
            exit 1
          fi
          echo "✅ All Python files under 300 lines"
